[pytest]
# Make a plain `pytest` from the repo root behave like the CI gate (repo-gate.py --ci):
#  - importlib import mode: tolerant of same-basename test files across skill dirs
#  - examples/ and demos/ are shipped documentation, not convention tests - skip them
#    (they may need a framework harness, e.g. Textual, that is not a test dependency here)
addopts = --import-mode=importlib --ignore-glob=*/examples/* --ignore-glob=*/demos/*
