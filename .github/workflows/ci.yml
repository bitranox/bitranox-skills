name: ci

# Reporting check (not a required/merge-blocking status): runs the repo gate, which in
# CI enforces tests-exist + pytest-passes + valid-JSON + LF endings. Version-bump is NOT
# checked here - bumping is a merge/release decision owned by the maintainer, not something
# a contributor's PR must satisfy (the local pre-commit hook enforces it at push time).
# Direct additive pushes to master stay free (see CLAUDE.md); this just surfaces red/green.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need origin/master so the version-bump check can diff against it

      - uses: actions/setup-python@v5
        with:
          # 3.13+ required: python-performance-review/setup_env.py (and its tests) gate on it.
          python-version: "3.13"

      - name: Install test dependencies
        # The convention test suite (examples/ and demos/ are excluded by the gate) needs
        # these. markitdown is intentionally omitted: its tests pytest.importorskip and so
        # skip cleanly, keeping CI lean.
        run: |
          python -m pip install --upgrade pip
          pip install pytest PyYAML lxml defusedxml ruamel.yaml httpx2

      - name: Run repo gate (tests-exist, pytest, version-bump, json, LF)
        run: python plugins/bitranox/hooks/repo-gate.py --ci
